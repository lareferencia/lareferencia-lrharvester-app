############################ SEMANTIC EMBEDDINGS ##################################

# URL del servicio de embeddings (OpenAI-compatible API)
embedding.api.url=http://localhost:8000/

# Timeout de conexión al servicio de embeddings (segundos)
embedding.api.timeout.seconds=30

# Modelo de embeddings a utilizar
embedding.model.name=embaas/sentence-transformers-multilingual-e5-large

# Tipo de encoding del vector de salida (float, base64)
embedding.model.datatype=float

# Dimensión esperada del vector (0 = sin validación)
embedding.model.dimension=1024

# Identificador de la aplicación enviado en cada request
embedding.model.applicationId=lareferencia-harvester
